name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'ubuntu-22.04-arm' # Only available in public repos.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm' # Set this to npm, yarn or pnpm.

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # This matches tauri's default project layout. Change this if you have a different layout.
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: npm ci # change this to npm, yarn or pnpm depending on which one you use.

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces __VERSION__ with the app version.
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-android:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve app version
        id: version
        run: echo "version=$(jq -r '.version' src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Restore Android NDK symlinks
        run: |
          directory="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          find "$directory" -type l | while read -r link; do
            current_target=$(readlink "$link")
            new_target="$directory/$(basename "$current_target")"
            ln -sf "$new_target" "$link"
          done

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run android:init -- --ci
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Setup Android signing
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        if: env.ANDROID_KEY_BASE64 != ''
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${ANDROID_KEY_ALIAS}" > keystore.properties
          echo "password=${ANDROID_KEY_PASSWORD}" >> keystore.properties
          base64 -d <<< "${ANDROID_KEY_BASE64}" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Configure release signing in Gradle
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        if: env.ANDROID_KEY_BASE64 != ''
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          path = Path("src-tauri/gen/android/app/build.gradle.kts")
          text = path.read_text()

          if "signingConfigs" in text:
              print("signingConfigs already exists, skipping patch.")
              raise SystemExit(0)

          if "import java.io.FileInputStream" not in text:
              text = "import java.io.FileInputStream\n" + text
              print("Added missing import: java.io.FileInputStream")

          signing_block = """
          signingConfigs {
              create("release") {
                  val keystorePropertiesFile = rootProject.file("keystore.properties")
                  val keystoreProperties = java.util.Properties()
                  if (keystorePropertiesFile.exists()) {
                      keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                  }
                  keyAlias = keystoreProperties["keyAlias"] as String
                  keyPassword = keystoreProperties["password"] as String
                  storeFile = file(keystoreProperties["storeFile"] as String)
                  storePassword = keystoreProperties["password"] as String
              }
          }
          """.strip()

          text = re.sub(r'(\n\s*buildTypes \{)', f'\n{signing_block}\\1', text, count=1)

          text = re.sub(
              r'(getByName\("release"\) \{\n\s*)',
              r'\1signingConfig = signingConfigs.getByName("release")\n',
              text,
              count=1
          )

          path.write_text(text)
          print("Gradle file patched successfully for release signing.")
          PY

      - name: Build Android APK (release + per-abi)
        run: npm run android:build -- --split-per-abi
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pigeon-app-android-${{ steps.version.outputs.version }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload APK to draft release
        run: |
          shopt -s globstar nullglob
          files=(src-tauri/gen/android/app/build/outputs/apk/**/*.apk)
          if ((${#files[@]} == 0)); then
            echo "No APK files found"
            exit 1
          fi
          gh release upload "app-v${{ steps.version.outputs.version }}" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
